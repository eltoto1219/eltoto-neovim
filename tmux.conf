set -g history-limit 200000
setw -g mode-keys vi

bind -n F12 copy-mode
bind -n F11 if -F "#{pane_in_mode}" "send -X cancel" ""

bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi q send -X cancel
bind -T copy-mode-vi Space send -X cancel
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi a send -X cancel
bind -T copy-mode-vi Escape send -X cancel

bind -T copy-mode j send -X cursor-down
bind -T copy-mode k send -X cursor-up
bind -T copy-mode C-d send -X halfpage-down
bind -T copy-mode C-u send -X halfpage-up
bind -T copy-mode v send -X begin-selection
bind -T copy-mode y send -X copy-selection-and-cancel
bind -T copy-mode Enter send -X copy-selection-and-cancel
bind -T copy-mode q send -X cancel
bind -T copy-mode Space send -X cancel
bind -T copy-mode i send -X cancel
bind -T copy-mode a send -X cancel
bind -T copy-mode Escape send -X cancel
